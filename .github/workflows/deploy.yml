name: Deploy to VPS

on:
  push:
    branches:
      - main # Обновляется при пуше в main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /opt/cupmate/scripts/deploy-vps.sh
